services:
  aceest-app:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: aceest-fitness-app
    environment:
      - PYTHONPATH=/app
      - DB_PATH=/app/data/aceest_fitness.db
      - FLASK_HOST=0.0.0.0
      - FLASK_PORT=5000
      - FLASK_DEBUG=false
    volumes:
      - ./data:/app/data
    ports:
      - "5000:5000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - aceest-network

volumes:
  data_volume:
    driver: local

networks:
  aceest-network:
    driver: bridge
