# =============================================================
# Rolling Update Deployment Strategy for ACEest Fitness
# =============================================================
# Pods are replaced incrementally (1 at a time). At least 2 pods
# remain available at all times, ensuring zero downtime.
# Rollback: kubectl rollout undo deployment/aceest-fitness-rolling
# =============================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-fitness-rolling
  namespace: aceest
  labels:
    app: aceest-fitness
    strategy: rolling
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1          # 1 extra pod during update
      maxUnavailable: 0     # zero downtime
  selector:
    matchLabels:
      app: aceest-fitness
      strategy: rolling
  template:
    metadata:
      labels:
        app: aceest-fitness
        strategy: rolling
    spec:
      containers:
        - name: aceest-fitness
          image: yourdockerhubusername/aceest-fitness:v3.2.4
          ports:
            - containerPort: 5000
          livenessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"

---
apiVersion: v1
kind: Service
metadata:
  name: aceest-fitness-rolling-service
  namespace: aceest
spec:
  type: NodePort
  selector:
    app: aceest-fitness
    strategy: rolling
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5000
      nodePort: 30083
