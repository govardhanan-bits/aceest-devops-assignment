# =============================================================
# A/B Testing Deployment Strategy for ACEest Fitness
# =============================================================
# Two versions run side-by-side, with an Ingress routing based
# on HTTP headers. Users with header "X-Version: B" get the new
# version; all others get version A (stable).
# =============================================================

# --- Version A (control group) ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-fitness-version-a
  namespace: aceest
  labels:
    app: aceest-fitness
    version: a
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aceest-fitness
      version: a
  template:
    metadata:
      labels:
        app: aceest-fitness
        version: a
    spec:
      containers:
        - name: aceest-fitness
          image: yourdockerhubusername/aceest-fitness:v3.1.2
          ports:
            - containerPort: 5000

---
# --- Version B (experiment group) ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-fitness-version-b
  namespace: aceest
  labels:
    app: aceest-fitness
    version: b
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aceest-fitness
      version: b
  template:
    metadata:
      labels:
        app: aceest-fitness
        version: b
    spec:
      containers:
        - name: aceest-fitness
          image: yourdockerhubusername/aceest-fitness:v3.2.4
          ports:
            - containerPort: 5000

---
# --- Service for Version A ---
apiVersion: v1
kind: Service
metadata:
  name: aceest-fitness-version-a-svc
  namespace: aceest
spec:
  selector:
    app: aceest-fitness
    version: a
  ports:
    - port: 80
      targetPort: 5000

---
# --- Service for Version B ---
apiVersion: v1
kind: Service
metadata:
  name: aceest-fitness-version-b-svc
  namespace: aceest
spec:
  selector:
    app: aceest-fitness
    version: b
  ports:
    - port: 80
      targetPort: 5000

---
# --- Ingress for A/B header-based routing ---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aceest-fitness-ab-ingress
  namespace: aceest
  annotations:
    nginx.ingress.kubernetes.io/canary: "true"
    nginx.ingress.kubernetes.io/canary-by-header: "X-Version"
    nginx.ingress.kubernetes.io/canary-by-header-value: "B"
spec:
  ingressClassName: nginx
  rules:
    - host: aceest-fitness.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: aceest-fitness-version-b-svc
                port:
                  number: 80
