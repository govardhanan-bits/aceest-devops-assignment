{% extends "base.html" %}
{% block title %}Login - ACEest Fitness{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card">
            <div class="card-header text-center">
                <h2>ACEest FITNESS & GYM</h2>
                <p class="mb-0">Fitness Management System</p>
            </div>
            <div class="card-body p-4">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <input type="text" name="username" class="form-control" required autofocus>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-gold w-100">Login</button>
                </form>
                <p class="text-muted text-center mt-3 small">Default: admin / admin</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
